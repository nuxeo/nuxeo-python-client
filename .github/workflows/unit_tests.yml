name: Unit tests
permissions:
  contents: read
  pull-requests: read

on:
  # Check for updates every day
  schedule:
    - cron: "0 0 * * *"

  # Check on any PR
  pull_request:
    branches: ["*"]
  push:
    branches: [master]
    paths:
      - "nuxeo/**/*.py"
      - "setup.*"
      - "tests/unit/*.py"

jobs:
  unit-tests-2023:
    name: "2023"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.13.1"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: python -m pip install -U pip tox

      - name: Unit tests
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NXDRIVE_TEST_NUXEO_URL: https://drive-2023.beta.nuxeocloud.com/nuxeo/
          NUXEO_TEST_USERNAME: ${{ secrets.NUXEO_2023_TEST_USERNAME }}
          NUXEO_TEST_PASSWORD: ${{ secrets.NUXEO_2023_TEST_PASSWORD }}
        # Run tox using the version of Python in `PATH`
        run: python -m tox -e unit

      - name: Upload coverage to Codecov
        if: ${{ success() || failure() }}
        uses: codecov/codecov-action@v3.1.5
        with:
          files: ./coverage.xml
          flags: unit
          env_vars: PYTHON
  unit-tests-2025:
    name: "2025"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.13.1"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: python -m pip install -U pip tox

      - name: Unit tests
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NXDRIVE_TEST_NUXEO_URL: https://drive-2025.beta.nuxeocloud.com/nuxeo/
          NUXEO_TEST_USERNAME: ${{ secrets.NUXEO_2025_TEST_USERNAME }}
          NUXEO_TEST_PASSWORD: ${{ secrets.NUXEO_2025_TEST_PASSWORD }}
        # Run tox using the version of Python in `PATH`
        run: python -m tox -e unit

      - name: Upload coverage to Codecov
        if: ${{ success() || failure() }}
        uses: codecov/codecov-action@v3.1.5
        with:
          files: ./coverage.xml
          flags: unit
          env_vars: PYTHON
